<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; img-src {{cspSource}} data: blob:; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
  <title>Face ID</title>
  <style>
/* __SHARED_CSS__ */

.face-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  height: calc(100vh - 44px);
}

/* ── People sidebar ── */
.people-sidebar {
  border-right: 1px solid var(--vscode-panel-border, #333);
  display: flex; flex-direction: column; overflow: hidden;
}
.people-list { overflow-y: auto; flex: 1; }

.person-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; cursor: pointer;
  border-left: 3px solid transparent; font-size: 12px;
}
.person-row:hover  { background: var(--vscode-list-hoverBackground); }
.person-row.active { background: var(--vscode-list-activeSelectionBackground);
                     border-left-color: var(--vscode-button-background); }
.person-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.person-name  { flex: 1; font-weight: 500; }
.person-count { font-size: 10px; color: var(--vscode-descriptionForeground); }

/* ── Detail pane ── */
.detail-pane { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; min-height: 0; }

/* ── Collapsible section header ── */
.section-hdr {
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; user-select: none;
  font-size: 12px; font-weight: 600; padding: 4px 0; margin-bottom: 4px;
}
.section-hdr:hover { opacity: 0.8; }
.section-arrow { font-size: 9px; width: 10px; }

/* ── Backend badge ── */
.backend-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 10px; font-size: 11px;
}
.backend-badge.loading { background: #2a2a00; color: #e5c07b; }
.backend-badge.ready   { background: #002a00; color: #98c379; }
.backend-badge.error   { background: #2a0000; color: #e06c75; }

/* ── Enrolled face thumbnails ── */
.face-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.face-thumb { position: relative; width: 80px; cursor: default; }
.face-thumb img {
  width: 80px; height: 80px; object-fit: cover;
  border-radius: 4px; display: block; border: 2px solid transparent;
}
.face-thumb .remove-face {
  position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #e74c3c; color: #fff; border: none;
  font-size: 12px; line-height: 18px; text-align: center;
  cursor: pointer; padding: 0; display: none;
}
.face-thumb:hover .remove-face { display: block; }
.face-thumb .face-label {
  font-size: 10px; color: var(--vscode-descriptionForeground);
  text-align: center; margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Year reference sections ── */
.ref-year-section {
  border: 1px solid var(--vscode-panel-border, #333);
  border-radius: 4px; margin-bottom: 6px; overflow: hidden;
}
.ref-year-header {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: var(--vscode-sideBar-background, #252526);
  cursor: pointer; user-select: none; font-size: 12px;
}
.ref-year-header:hover { background: var(--vscode-list-hoverBackground); }
.ref-year-label { font-weight: 600; }
.ref-year-count { color: var(--vscode-descriptionForeground); font-size: 11px; }
.ref-year-body  { padding: 8px 10px; }

/* ── Add from year row ── */
.add-year-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 12px;
}
.add-year-row label { color: var(--vscode-descriptionForeground); white-space: nowrap; }
.add-year-row select {
  flex: 1; padding: 3px 6px;
  background: var(--vscode-input-background);
  color: var(--vscode-input-foreground);
  border: 1px solid var(--vscode-input-border, #3c3c3c);
  border-radius: 2px; font-size: 12px;
}

/* ── Scan section ── */
.scan-section { border: 1px solid var(--vscode-panel-border, #333); border-radius: 4px; overflow: hidden; }
.scan-header  { padding: 8px 12px; background: var(--vscode-sideBar-background, #252526); font-size: 12px; font-weight: 600; }
.scan-body    { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

.slider-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.slider-row label { white-space: nowrap; color: var(--vscode-descriptionForeground); }
.slider-row input[type=range] { flex: 1; }
.slider-val { width: 32px; text-align: right; font-weight: 600; }

.year-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.year-row label { color: var(--vscode-descriptionForeground); }
.year-row input[type=number] {
  width: 64px; padding: 2px 6px;
  background: var(--vscode-input-background); color: var(--vscode-input-foreground);
  border: 1px solid var(--vscode-input-border, #3c3c3c); border-radius: 2px; font-size: 12px;
}

/* ── Results grid ── */
.results-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 6px; margin-top: 8px;
}
.result-cell img         { width: 100%; height: 100px; object-fit: cover; border-radius: 3px; display: block; background: #1e1e1e; }
.result-cell-icon        { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: #1e1e1e; border-radius: 3px; }
.result-cell-name        { font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--vscode-descriptionForeground); margin-top: 2px; }

/* ── Enroll log ── */
.enroll-log {
  font-size: 11px; max-height: 120px; overflow-y: auto;
  background: var(--vscode-input-background);
  border: 1px solid var(--vscode-input-border, #3c3c3c);
  border-radius: 2px; padding: 6px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
.enroll-log-item { display: flex; gap: 6px; }
.enroll-log-item .status-ok   { color: #98c379; }
.enroll-log-item .status-bad  { color: #e06c75; }
.enroll-log-item .status-warn { color: #e5c07b; }

/* ── Library browser overlay ── */
.lib-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.65);
  display: flex; align-items: center; justify-content: center;
}
.lib-modal {
  background: var(--vscode-editor-background);
  border: 1px solid var(--vscode-focusBorder);
  border-radius: 6px; width: 84vw; height: 84vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.lib-modal-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--vscode-panel-border, #333);
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.lib-months {
  display: flex; gap: 4px; padding: 8px 12px; flex-wrap: wrap;
  border-bottom: 1px solid var(--vscode-panel-border, #333); flex-shrink: 0;
}
.lib-month-btn {
  padding: 2px 10px; border-radius: 10px; font-size: 11px; cursor: pointer;
  background: var(--vscode-button-secondaryBackground, #3a3d41);
  color: var(--vscode-button-secondaryForeground, #ccc);
  border: none;
}
.lib-month-btn.active {
  background: var(--vscode-button-background); color: var(--vscode-button-foreground);
}
.lib-grid {
  flex: 1; overflow-y: auto; padding: 10px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px; align-content: start;
}
.lib-photo { position: relative; cursor: pointer; }
.lib-photo img {
  width: 100%; height: 90px; object-fit: cover;
  border-radius: 3px; display: block;
  border: 2px solid transparent; transition: border-color 0.1s;
}
.lib-photo.selected img { border-color: var(--vscode-button-background); }
.lib-check {
  position: absolute; top: 3px; right: 3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--vscode-button-background); color: var(--vscode-button-foreground);
  font-size: 11px; display: none; align-items: center; justify-content: center; font-weight: 700;
}
.lib-photo.selected .lib-check { display: flex; }
.lib-modal-footer {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-top: 1px solid var(--vscode-panel-border, #333); flex-shrink: 0;
}
.lib-load-more {
  grid-column: 1 / -1; display: flex; justify-content: center;
  padding: 10px 0 4px;
}
  </style>
</head>
<body>

<div class="toolbar">
  <h2>Face ID</h2>
  <span id="backendBadge" class="backend-badge loading">⏳ Loading models…</span>
  <div class="spacer"></div>
  <button class="secondary" id="btnAddPerson">+ Add Person</button>
</div>

<div class="face-layout">
  <div class="people-sidebar">
    <div class="people-list" id="peopleList">
      <div class="empty-state" style="padding:32px 16px">
        <div class="empty-icon">👤</div>
        <div class="empty-label" style="font-size:12px">No people yet</div>
      </div>
    </div>
  </div>
  <div class="detail-pane" id="detailPane">
    <div class="empty-state">
      <div class="empty-icon">👈</div>
      <div class="empty-label">Select a person to enrol reference photos and run a scan</div>
    </div>
  </div>
</div>

<!-- ── Library browser modal ── -->
<div id="libOverlay" class="lib-overlay" style="display:none">
  <div class="lib-modal">
    <div class="lib-modal-header">
      <span id="libTitle">Browse library</span>
      <div class="spacer"></div>
      <span id="libLoading" style="font-size:11px;color:var(--vscode-descriptionForeground)">Loading…</span>
      <button class="secondary" id="libCancel">Cancel</button>
    </div>
    <div class="lib-months" id="libMonths"></div>
    <div class="lib-grid"   id="libGrid"></div>
    <div class="lib-modal-footer">
      <span id="libSelCount" style="font-size:12px;color:var(--vscode-descriptionForeground)">0 selected</span>
      <div class="spacer"></div>
      <button id="libEnrollBtn" disabled>Enroll selected</button>
    </div>
  </div>
</div>

<script nonce="{{nonce}}">
/* __SHARED_JS__ */

// ── State ─────────────────────────────────────────────────────────────────────
let people       = [];
let activePerson = null;
let backendReady = false;
let scanning     = false;
let enrolling    = false;
/** @type {string|null} */
let savedEnrollLog = null;
/** @type {string[]} */
let libraryYears   = [];
/**
 * @type {{ personName:string, year:string, months:any[],
 *          photosMap:Map<string,any>, selected:Set<string>, activeMonth:string|null } | null}
 */
let libBrowser = null;

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── DOM refs ──────────────────────────────────────────────────────────────────
const backendBadge = document.getElementById('backendBadge');
const peopleList   = document.getElementById('peopleList');
const detailPane   = document.getElementById('detailPane');
const libOverlay   = document.getElementById('libOverlay');
const libTitle     = document.getElementById('libTitle');
const libLoading   = document.getElementById('libLoading');
const libMonths    = document.getElementById('libMonths');
const libGrid      = document.getElementById('libGrid');
const libSelCount  = document.getElementById('libSelCount');
const libEnrollBtn = document.getElementById('libEnrollBtn');

// ── Backend status ────────────────────────────────────────────────────────────
onMessage('initStatus', msg => {
  if (msg.status === 'ready') {
    backendBadge.className = 'backend-badge ready';
    backendBadge.textContent = `⚡ ${msg.backend}`;
    backendReady = true;
    // Re-render so scan button enables
    const p = people.find(p => p.name === activePerson);
    if (p) renderDetail(p);
  } else if (msg.status === 'loading') {
    backendBadge.className = 'backend-badge loading';
    backendBadge.textContent = '⏳ Loading models…';
  } else {
    backendBadge.className = 'backend-badge error';
    backendBadge.textContent = `❌ ${msg.message}`;
  }
});

// ── Library years ─────────────────────────────────────────────────────────────
onMessage('libraryYears', msg => { libraryYears = msg.years; });

// ── People ────────────────────────────────────────────────────────────────────
onMessage('people', msg => {
  people = msg.people;
  renderPeopleList();
  if (activePerson) {
    const still = people.find(p => p.name === activePerson);
    if (still) {
      renderDetail(still);
      if (savedEnrollLog !== null) {
        const log = document.getElementById('enrollLog');
        if (log) { log.innerHTML = savedEnrollLog; log.style.display = ''; }
        savedEnrollLog = null;
        enrolling = false;
      }
    } else { activePerson = null; showEmptyDetail(); }
  }
});

function renderPeopleList() {
  if (!people.length) {
    peopleList.innerHTML = `
      <div class="empty-state" style="padding:32px 16px">
        <div class="empty-icon">👤</div>
        <div class="empty-label" style="font-size:12px">No people yet</div>
      </div>`;
    return;
  }
  peopleList.innerHTML = '';
  for (const p of people) {
    const total = Object.values(p.yearSamples || {}).reduce((n, s) => n + s.photos.length, 0);
    const row = document.createElement('div');
    row.className = `person-row${p.name === activePerson ? ' active' : ''}`;
    row.innerHTML = `
      <div class="person-dot" style="background:${p.color}"></div>
      <span class="person-name">${esc(p.name)}</span>
      <span class="person-count">${total} ref${total !== 1 ? 's' : ''}</span>`;
    row.onclick = () => { activePerson = p.name; renderPeopleList(); renderDetail(p); };
    peopleList.appendChild(row);
  }
}

function showEmptyDetail() {
  detailPane.innerHTML = `<div class="empty-state">
    <div class="empty-icon">👈</div>
    <div class="empty-label">Select a person to enrol reference photos and run a scan</div>
  </div>`;
}

// ── Person detail ─────────────────────────────────────────────────────────────
function renderDetail(person) {
  detailPane.innerHTML = '';

  // Header
  const hdr = el('div', { style: 'display:flex;align-items:center;gap:10px' });
  const dot  = el('div', { className: 'person-dot', style: `background:${person.color};width:14px;height:14px` });
  const nameEl = el('h3', { textContent: person.name, style: 'font-size:15px;font-weight:600' });
  const delBtn = el('button', { className: 'danger', textContent: 'Delete person',
    style: 'margin-left:auto;font-size:11px;padding:2px 8px' });
  delBtn.onclick = () => confirmDeletePerson(person.name);
  hdr.append(dot, nameEl, delBtn);
  detailPane.appendChild(hdr);

  // Reference photos — collapsible section
  const refSection = el('div');

  const refArrow = el('span', { className: 'section-arrow', textContent: '▼' });
  const refHdr   = el('div',  { className: 'section-hdr' });
  refHdr.append(refArrow, el('span', { textContent: 'Reference photos' }));

  const refBody = el('div');

  refHdr.onclick = () => {
    const hide = refBody.style.display !== 'none';
    refBody.style.display  = hide ? 'none' : '';
    refArrow.textContent   = hide ? '▶' : '▼';
  };

  const enrolledYears = Object.keys(person.yearSamples || {}).sort((a, b) => {
    if (a === 'legacy') return 1;
    if (b === 'legacy') return -1;
    return Number(b) - Number(a);
  });
  enrolledYears.forEach((year, idx) => refBody.appendChild(buildYearSection(person, year, idx > 0)));

  if (!enrolledYears.length) {
    refBody.appendChild(el('div', {
      textContent: 'No reference photos yet — browse the library below',
      style: 'font-size:12px;color:var(--vscode-descriptionForeground);margin-bottom:4px'
    }));
  }

  // Add from year picker
  const addRow = el('div', { className: 'add-year-row' });
  addRow.appendChild(el('label', { textContent: 'Add refs from year:' }));
  const yearSel = el('select');
  yearSel.appendChild(el('option', { value: '', textContent: '— pick a year —' }));
  for (const y of libraryYears) yearSel.appendChild(el('option', { value: y, textContent: y }));
  const browseBtn = el('button', { className: 'secondary', textContent: 'Browse library' });
  browseBtn.onclick = () => { if (yearSel.value) openLibraryBrowser(person.name, yearSel.value); };
  addRow.append(yearSel, browseBtn);
  refBody.appendChild(addRow);

  refSection.append(refHdr, refBody);
  detailPane.appendChild(refSection);

  // Enroll log
  const enrollLog = el('div', { id: 'enrollLog', style: 'display:none' });
  enrollLog.className = 'enroll-log';
  detailPane.appendChild(enrollLog);

  // Scan section
  detailPane.appendChild(buildScanSection(person));

  // Results (shown after scan)
  detailPane.appendChild(el('div', { id: 'resultsSection', style: 'display:none' }));
}

function buildYearSection(person, year, startCollapsed = false) {
  const sample = person.yearSamples[year];
  const count  = sample?.photos?.length || 0;
  const label  = year === 'legacy' ? 'Legacy (migrated)' : year;

  const section = el('div', { className: 'ref-year-section' });
  const hdr     = el('div', { className: 'ref-year-header' });
  hdr.append(
    el('span', { className: 'ref-year-label', textContent: label }),
    el('span', { className: 'ref-year-count', textContent: `${count} ref${count !== 1 ? 's' : ''}` })
  );
  const brBtn = el('button', { className: 'secondary', textContent: 'Browse library',
    style: 'margin-left:auto;font-size:11px;padding:2px 8px' });
  brBtn.onclick = e => { e.stopPropagation(); openLibraryBrowser(person.name, year === 'legacy' ? libraryYears[0] || '' : year); };
  hdr.appendChild(brBtn);

  const body = el('div', { className: 'ref-year-body', style: startCollapsed ? 'display:none' : '' });
  const grid = el('div', { className: 'face-grid' });
  for (let i = 0; i < (sample?.photos || []).length; i++) {
    const photo = sample.photos[i];
    const wrap = el('div', { className: 'face-thumb' });
    const img  = el('img', { src: photo.thumb, title: photo.imagePath });
    const rm   = el('button', { className: 'remove-face', textContent: '×', title: 'Remove' });
    rm.onclick = () => sendMessage('removeEnrollment', { name: person.name, year, idx: i });
    wrap.append(img, rm, el('div', { className: 'face-label', textContent: fname(photo.imagePath) }));
    grid.appendChild(wrap);
  }
  body.appendChild(grid);

  hdr.onclick = e => {
    if (e.target === brBtn || brBtn.contains(/** @type {Node} */(e.target))) return;
    const hide = body.style.display !== 'none';
    body.style.display = hide ? 'none' : '';
  };
  section.append(hdr, body);
  return section;
}

// ── Scan controls ─────────────────────────────────────────────────────────────
function buildScanSection(person) {
  const totalDescs = Object.values(person.yearSamples || {})
    .reduce((n, s) => n + s.descriptors.length, 0);

  const section = el('div', { className: 'scan-section' });
  section.appendChild(el('div', { className: 'scan-header', textContent: `Scan for ${person.name}` }));
  const body = el('div', { className: 'scan-body' });

  // Threshold slider
  const threshRow    = el('div', { className: 'slider-row' });
  const threshVal    = el('span', { className: 'slider-val', textContent: '0.45' });
  const threshSlider = el('input', { type: 'range', min: '0.2', max: '0.7', step: '0.01', value: '0.45' });
  threshSlider.oninput = () => { threshVal.textContent = threshSlider.value; };
  threshRow.append(el('label', { textContent: 'Match threshold:' }), threshSlider, threshVal);
  body.appendChild(threshRow);
  body.appendChild(el('div', {
    textContent: 'Lower = stricter (fewer false positives). 0.45 is a good starting point.',
    style: 'font-size:10px;color:var(--vscode-descriptionForeground)'
  }));

  // Year range
  const yearRow = el('div', { className: 'year-row' });
  const yearFrom = el('input', { type: 'number', placeholder: 'From year', id: 'yearFrom', min: '1990', max: '2099' });
  const yearTo   = el('input', { type: 'number', placeholder: 'To year',   id: 'yearTo',   min: '1990', max: '2099' });
  yearRow.append(
    el('label', { textContent: 'Year range:' }), yearFrom,
    el('span', { textContent: '–', style: 'color:var(--vscode-descriptionForeground)' }),
    yearTo,
    el('span', { textContent: '(blank = all years)', style: 'color:var(--vscode-descriptionForeground)' })
  );
  body.appendChild(yearRow);

  // Buttons
  const btnRow  = el('div', { style: 'display:flex;gap:8px;align-items:center' });
  const scanBtn = el('button', { id: 'btnScan', textContent: `Find ${person.name}` });
  const abrtBtn = el('button', { id: 'btnAbort', className: 'secondary', textContent: 'Stop', style: 'display:none' });
  scanBtn.disabled = !backendReady || totalDescs === 0;
  if (totalDescs === 0) {
    btnRow.appendChild(el('span', {
      textContent: 'Add at least one reference photo before scanning',
      style: 'font-size:11px;color:var(--vscode-descriptionForeground)'
    }));
  }
  scanBtn.onclick = () => sendMessage('scan', {
    personName: person.name,
    threshold:  parseFloat(threshSlider.value),
    yearFrom:   yearFrom.value ? parseInt(yearFrom.value) : undefined,
    yearTo:     yearTo.value   ? parseInt(yearTo.value)   : undefined,
  });
  abrtBtn.onclick = () => sendMessage('abortScan', {});
  btnRow.append(scanBtn, abrtBtn);
  body.appendChild(btnRow);

  // Progress
  const prog = el('div', { id: 'scanProgress', style: 'display:none' });
  prog.innerHTML = `
    <div id="progressLabel" class="progress-label">Scanning…</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div id="progressNums" class="progress-label"></div>`;
  body.appendChild(prog);
  section.appendChild(body);
  return section;
}

// ── Library browser ───────────────────────────────────────────────────────────
const LIB_PAGE_SIZE = 10;

function openLibraryBrowser(personName, year) {
  if (!year) return;
  libBrowser = { personName, year, months: [], photosMap: new Map(), selected: new Set(), activeMonth: null,
                 currentPhotos: [], renderOffset: 0 };
  libTitle.textContent    = `Browse ${year} library — reference photos for ${personName}`;
  libLoading.style.display = '';
  libMonths.innerHTML = '';
  libGrid.innerHTML   = '';
  libSelCount.textContent = '0 selected';
  libEnrollBtn.disabled   = true;
  libOverlay.style.display = '';
  sendMessage('getLibraryYearPhotos', { year });
}

onMessage('libraryYearPhotos', msg => {
  if (!libBrowser || libBrowser.year !== msg.year) return;
  libLoading.style.display = 'none';
  libBrowser.months = msg.months;
  libBrowser.photosMap = new Map();
  for (const m of msg.months) for (const ph of m.photos) libBrowser.photosMap.set(ph.path, ph);

  libMonths.innerHTML = '';
  for (const m of msg.months) {
    const name = MONTH_NAMES[parseInt(m.month, 10) - 1] || m.month;
    const btn  = el('button', { className: 'lib-month-btn', textContent: `${name} (${m.photos.length})` });
    btn.onclick = () => showLibMonth(m.month);
    libMonths.appendChild(btn);
  }
  if (msg.months.length) showLibMonth(msg.months[msg.months.length - 1].month); // most recent month
});

function showLibMonth(month) {
  if (!libBrowser) return;
  libBrowser.activeMonth = month;
  [...libMonths.querySelectorAll('.lib-month-btn')].forEach((btn, i) => {
    btn.classList.toggle('active', libBrowser.months[i]?.month === month);
  });
  const monthData = libBrowser.months.find(m => m.month === month);
  libGrid.innerHTML = '';
  if (!monthData) return;
  libBrowser.currentPhotos = monthData.photos;
  libBrowser.renderOffset  = 0;
  renderLibPage();
}

function renderLibPage() {
  if (!libBrowser) return;
  // Remove existing load-more sentinel
  libGrid.querySelector('.lib-load-more')?.remove();

  const photos = libBrowser.currentPhotos;
  const start  = libBrowser.renderOffset;
  const end    = Math.min(start + LIB_PAGE_SIZE, photos.length);

  const frag = document.createDocumentFragment();
  for (let i = start; i < end; i++) {
    const photo = photos[i];
    const cell  = el('div', { className: `lib-photo${libBrowser.selected.has(photo.path) ? ' selected' : ''}` });
    const img   = el('img', { src: photo.uri, loading: 'lazy', title: photo.name });
    const chk   = el('div', { className: 'lib-check', textContent: '✓' });
    cell.append(img, chk);
    cell.onclick = () => toggleLibPhoto(photo.path, cell);
    frag.appendChild(cell);
  }
  libGrid.appendChild(frag);
  libBrowser.renderOffset = end;

  if (end < photos.length) {
    const remaining = photos.length - end;
    const sentinel  = el('div', { className: 'lib-load-more' });
    const btn = el('button', { className: 'secondary',
      textContent: `Load ${Math.min(LIB_PAGE_SIZE, remaining)} more (${remaining} remaining)` });
    btn.onclick = () => renderLibPage();
    sentinel.appendChild(btn);
    libGrid.appendChild(sentinel);
  }
}

function toggleLibPhoto(photoPath, cell) {
  if (!libBrowser) return;
  if (libBrowser.selected.has(photoPath)) { libBrowser.selected.delete(photoPath); cell.classList.remove('selected'); }
  else                                    { libBrowser.selected.add(photoPath);    cell.classList.add('selected');    }
  const n = libBrowser.selected.size;
  libSelCount.textContent = `${n} selected`;
  libEnrollBtn.disabled   = n === 0;
}

document.getElementById('libCancel').onclick = () => { libOverlay.style.display = 'none'; libBrowser = null; };

document.getElementById('libEnrollBtn').onclick = () => {
  if (!libBrowser?.selected.size) return;
  const photos     = [...libBrowser.selected].map(p => libBrowser.photosMap.get(p));
  const personName = libBrowser.personName;
  libOverlay.style.display = 'none';
  libBrowser = null;
  sendMessage('enrollFromLibrary', { personName, photos });
};

// ── Enrolment messages ────────────────────────────────────────────────────────
onMessage('enrollStart', msg => {
  enrolling = true; savedEnrollLog = null;
  const log = document.getElementById('enrollLog');
  if (!log) return;
  log.style.display = ''; log.innerHTML = '';
  appendLog(log, 'info', `Processing ${msg.total} photo${msg.total !== 1 ? 's' : ''}…`);
});

onMessage('enrollProgress', msg => {
  const log = document.getElementById('enrollLog');
  if (log) appendLog(log, 'info', `[${msg.done}/${msg.total}] ${msg.file}`);
});

onMessage('enrollResult', msg => {
  const log = document.getElementById('enrollLog');
  if (!log) return;
  if (msg.status === 'ok')         appendLog(log, 'ok',   `✓ ${msg.file}`);
  else if (msg.status === 'no-face') appendLog(log, 'warn', `⚠ No face: ${msg.file}`);
  else                               appendLog(log, 'bad',  `✗ ${msg.file}: ${msg.message || 'error'}`);
  log.scrollTop = log.scrollHeight;
});

onMessage('enrollDone', () => {
  const log = document.getElementById('enrollLog');
  if (log) { appendLog(log, 'info', 'Done.'); savedEnrollLog = log.innerHTML; }
});

// ── Scan messages ─────────────────────────────────────────────────────────────
onMessage('scanStart', msg => {
  scanning = true;
  setEl('btnScan',      e => e.disabled = true);
  setEl('btnAbort',     e => e.style.display = '');
  setEl('scanProgress', e => e.style.display = '');
  setEl('progressLabel', e => e.textContent = `Scanning for ${msg.personName}…`);
  setEl('progressFill',  e => e.style.width = '0%');
  setEl('progressNums',  e => e.textContent = msg.prevFound
    ? `${msg.prevFound} already found · ${msg.total} new to check`
    : `${msg.total} images to check`);
  const rs = document.getElementById('resultsSection');
  if (rs) { rs.style.display = ''; rs.innerHTML = `<div style="font-size:12px;font-weight:600">Results</div><div class="results-grid" id="resultsGrid"></div>`; }
});

onMessage('scanProgress', msg => {
  const pct = msg.total > 0 ? Math.round(msg.done / msg.total * 100) : 0;
  setEl('progressFill',  e => e.style.width = `${pct}%`);
  setEl('progressLabel', e => e.textContent = `${msg.found} found · ${msg.rate} img/s · ~${fmtTime(msg.remaining)} remaining`);
  setEl('progressNums',  e => e.textContent = `${msg.done.toLocaleString()} / ${msg.total.toLocaleString()}`);
});

onMessage('scanMatch', msg => {
  const grid = document.getElementById('resultsGrid');
  if (!grid) return;
  const cell = el('div', { className: 'result-cell' });
  if (msg.uri) cell.appendChild(el('img', { src: msg.uri, loading: 'lazy', title: msg.filePath }));
  else         cell.appendChild(el('div', { className: 'result-cell-icon', textContent: '🖼️' }));
  cell.appendChild(el('div', { className: 'result-cell-name', textContent: fname(msg.filePath), title: msg.filePath }));
  grid.appendChild(cell);
  grid.scrollIntoView({ block: 'nearest' });
});

onMessage('scanDone', msg => {
  scanning = false;
  setEl('btnScan',       e => e.disabled = !backendReady);
  setEl('btnAbort',      e => e.style.display = 'none');
  setEl('progressFill',  e => e.style.width = '100%');
  setEl('progressLabel', e => e.textContent = `✅ Scan complete — ${msg.found} match${msg.found !== 1 ? 'es' : ''} found`);
  setEl('progressNums',  e => e.textContent = `${msg.done.toLocaleString()} images checked`);
});

onMessage('scanAborted', msg => {
  scanning = false;
  setEl('btnScan',       e => e.disabled = !backendReady);
  setEl('btnAbort',      e => e.style.display = 'none');
  setEl('progressLabel', e => e.textContent = `⛔ Scan stopped — ${msg.found} found so far`);
});

onMessage('error', msg => {
  const banner = el('div', { textContent: `⚠ ${msg.message}`,
    style: 'background:#2a0000;color:#e06c75;padding:8px 12px;border-radius:3px;font-size:12px' });
  detailPane.prepend(banner);
  setTimeout(() => banner.remove(), 6000);
});

// ── Add person ────────────────────────────────────────────────────────────────
document.getElementById('btnAddPerson').onclick = async () => {
  const name = await promptName();
  if (name) sendMessage('createPerson', { name });
};

function promptName() {
  return new Promise(resolve => {
    const wrap = el('div', { style: `
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      background:var(--vscode-editor-background);border:1px solid var(--vscode-focusBorder);
      border-radius:4px;padding:16px;z-index:999;min-width:260px;
      box-shadow:0 4px 16px rgba(0,0,0,0.5);`});
    const inp = el('input', { type: 'text', placeholder: 'Person name (e.g. Livy)',
      style: 'width:100%;margin-bottom:8px;display:block' });
    const btnRow = el('div', { style: 'display:flex;gap:8px;justify-content:flex-end' });
    const ok  = el('button', { textContent: 'Create' });
    const can = el('button', { className: 'secondary', textContent: 'Cancel' });
    ok.onclick  = () => { wrap.remove(); resolve(inp.value.trim() || null); };
    can.onclick = () => { wrap.remove(); resolve(null); };
    inp.onkeydown = e => { if (e.key === 'Enter') ok.click(); if (e.key === 'Escape') can.click(); };
    btnRow.append(can, ok); wrap.append(inp, btnRow);
    document.body.appendChild(wrap); inp.focus();
  });
}

function confirmDeletePerson(name) {
  if (!confirm(`Delete "${name}" and all reference data? This cannot be undone.`)) return;
  sendMessage('deletePerson', { name });
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function el(tag, props = {}) { const e = document.createElement(tag); Object.assign(e, props); return e; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fname(p) { return p.split(/[\\/]/).pop() || p; }
function fmtTime(s) {
  if (s < 60)   return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s % 60}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}
function appendLog(log, type, text) {
  const line = el('div', { className: 'enroll-log-item' });
  const span = el('span', { textContent: text });
  if (type === 'ok')   span.className = 'status-ok';
  if (type === 'bad')  span.className = 'status-bad';
  if (type === 'warn') span.className = 'status-warn';
  line.appendChild(span); log.appendChild(line);
}
function setEl(id, fn) { const e = document.getElementById(id); if (e) fn(e); }

sendMessage('ready', {});
</script>
</body>
